name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version: ["3.0", "3.1", "3.2", "3.3"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Run tests
        run: bundle exec rake test
        env:
          GEM_VERSION: ${{ github.ref_name }}

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: rubygems

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Configure RubyGems credentials
        uses: rubygems/configure-rubygems-credentials@main

      - name: Set version from tag
        run: echo "GEM_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build gem
        run: gem build kiriminaja.gemspec

      - name: Publish to RubyGems
        run: gem push kiriminaja-*.gem
